plugins {
    id 'java-library'
	id 'org.ceskaexpedice.processplatform.process' version '1.0.0'
}

/** Process definition */ 
processPlugin {
    pluginName = "pdf"
    profiles = [
        [
           profileId: "pdf-public",
           description: "Public PDF",
           jvmArgs: ["-Xms1g","-Xmx32g","-Dname=big"]
        ]
    ]
}


repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation 'org.apache.commons:commons-lang3:3.12.0'
    implementation 'org.ceskaexpedice:process-api:1.0-SNAPSHOT'
    implementation 'org.ceskaexpedice:process-api:1.0-SNAPSHOT'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}